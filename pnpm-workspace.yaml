packages:
  - "design-system"
  - "render-governor"
  - "runtime"
  - "apps/*"
  - "services/*"
  - "packages/*"
allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  core-js: false
  esbuild: true
  prisma: true
onlyBuiltDependencies:
  - "@nestjs/core"
  - "@prisma/client"
  - "@prisma/engines"
  - "esbuild"
  - "prisma"
