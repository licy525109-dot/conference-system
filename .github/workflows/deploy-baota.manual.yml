name: Manual Baota Deploy

# Manual only.
# No push trigger.
# Secrets required: BAOTA_HOST, BAOTA_PORT, BAOTA_USER, BAOTA_SSH_KEY.
# Review scripts/deploy/baota-deploy.example.sh before first run.
# Preferred server script: /www/scripts/conference-system-deploy-ci.sh.
# Fallback server script: CONFIRM_DEPLOY=YES /www/scripts/conference-system-deploy.sh.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Run reviewed Baota deploy script
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        shell: bash
        env:
          BAOTA_HOST: ${{ secrets.BAOTA_HOST }}
          BAOTA_PORT: ${{ secrets.BAOTA_PORT }}
          BAOTA_USER: ${{ secrets.BAOTA_USER }}
          BAOTA_SSH_KEY: ${{ secrets.BAOTA_SSH_KEY }}
        run: |
          set -euo pipefail
          for name in BAOTA_HOST BAOTA_PORT BAOTA_USER BAOTA_SSH_KEY; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required GitHub Secret: ${name}" >&2
              exit 1
            fi
          done

      - name: Prepare SSH key
        shell: bash
        env:
          BAOTA_SSH_KEY: ${{ secrets.BAOTA_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d "$RUNNER_TEMP/ssh"
          printf '%s\n' "$BAOTA_SSH_KEY" > "$RUNNER_TEMP/ssh/baota_key"
          chmod 600 "$RUNNER_TEMP/ssh/baota_key"

      - name: Execute server deployment script
        shell: bash
        env:
          BAOTA_HOST: ${{ secrets.BAOTA_HOST }}
          BAOTA_PORT: ${{ secrets.BAOTA_PORT }}
          BAOTA_USER: ${{ secrets.BAOTA_USER }}
        run: |
          set -euo pipefail
          SSH_OPTS=(
            -i "$RUNNER_TEMP/ssh/baota_key"
            -p "$BAOTA_PORT"
            -o StrictHostKeyChecking=accept-new
            -o IdentitiesOnly=yes
          )
          ssh "${SSH_OPTS[@]}" "${BAOTA_USER}@${BAOTA_HOST}" 'bash -s' <<'REMOTE_SCRIPT'
          set -euo pipefail
          if [[ -x /www/scripts/conference-system-deploy-ci.sh ]]; then
            /www/scripts/conference-system-deploy-ci.sh
          elif [[ -x /www/scripts/conference-system-deploy.sh ]]; then
            CONFIRM_DEPLOY=YES /www/scripts/conference-system-deploy.sh
          else
            echo "Deploy script missing or not executable: /www/scripts/conference-system-deploy-ci.sh or /www/scripts/conference-system-deploy.sh" >&2
            exit 127
          fi
          REMOTE_SCRIPT

      - name: Remove SSH key
        if: always()
        shell: bash
        run: |
          rm -f "$RUNNER_TEMP/ssh/baota_key"
