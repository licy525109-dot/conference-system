services:
  postgres:
    image: postgres:16-alpine
    container_name: conference_postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: conference
      POSTGRES_PASSWORD: conference_dev_password
      POSTGRES_DB: conference_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conference -d conference_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: conference_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
